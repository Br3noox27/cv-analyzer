<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>CV Analyzer</h1>
  <p class="subtitle">3 agentes de IA simulando um processo seletivo real</p>

  <div class="form-card">
    <label>Currículo (PDF)</label>
    <input type="file" id="cv_file" accept=".pdf">

    <label>URL da Vaga (opcional)</label>
    <input type="text" id="job_url" placeholder="https://...">

    <label>Texto da Vaga</label>
    <textarea id="job_text" placeholder="Cole aqui o texto da vaga..."></textarea>

    <button id="btn" onclick="analisar()">Analisar</button>
  </div>

  <div class="loading" id="loading">Analisando com 3 agentes... isso pode levar alguns segundos.</div>
  <div class="erro" id="erro"></div>

  <div class="abas-container" id="abas-container">
    <div class="abas">
      <div class="aba ativa" onclick="trocarAba('tecnico')">Técnico</div>
      <div class="aba" onclick="trocarAba('rh')">RH</div>
      <div class="aba" onclick="trocarAba('juiz')">Juiz</div>
    </div>

    <div class="aba-conteudo ativa" id="tab-tecnico">
      <div class="agente-header">
        <div class="agente-avatar">T</div>
        <div class="agente-info">
          <div class="agente-nome">Técnico</div>
        </div>
        <div class="agente-score">
          <div class="score-num" id="score-tecnico">—</div>
          <div class="score-label">score técnico</div>
        </div>
      </div>
      <div class="score-bar"><div class="score-fill" id="bar-tecnico"></div></div>
      <div id="conteudo-tecnico"></div>
    </div>

    <div class="aba-conteudo" id="tab-rh">
      <div class="agente-header">
        <div class="agente-avatar">RH</div>
        <div class="agente-info">
          <div class="agente-nome">RH</div>
        </div>
        <div class="agente-score">
          <div class="score-num" id="score-rh">—</div>
          <div class="score-label">score RH</div>
        </div>
      </div>
      <div class="score-bar"><div class="score-fill" id="bar-rh"></div></div>
      <div id="conteudo-rh"></div>
    </div>

    <div class="aba-conteudo" id="tab-juiz">
      <div class="agente-header">
        <div class="agente-avatar">J</div>
        <div class="agente-info">
          <div class="agente-nome">Juiz</div>
        </div>
        <div class="agente-score">
          <div class="score-num" id="score-juiz">—</div>
          <div class="score-label">score final</div>
        </div>
      </div>
      <div class="score-bar"><div class="score-fill" id="bar-juiz"></div></div>
      <div id="conteudo-juiz"></div>

      <div class="plano-container" id="plano-container">
        <div class="plano-titulo">Plano de ação do Juiz</div>
        <div id="plano-itens"></div>
      </div>
    </div>
  </div>

  <script>
    function trocarAba(nome) {
      document.querySelectorAll('.aba').forEach((a, i) => {
        a.classList.toggle('ativa', ['tecnico','rh','juiz'][i] === nome);
      });
      document.querySelectorAll('.aba-conteudo').forEach(c => c.classList.remove('ativa'));
      document.getElementById('tab-' + nome).classList.add('ativa');
    }

    function cor(s) {
      return s >= 70 ? 'score-alto' : s >= 40 ? 'score-medio' : 'score-baixo';
    }

    function barCor(s) {
      return s >= 70 ? '#1d7a4c' : s >= 40 ? '#8a5a00' : '#b3261e';
    }

    function tags(lista, cls) {
      return '<div class="tag-list">' + lista.map(i => `<span class="tag ${cls}">${i}</span>`).join('') + '</div>';
    }

    function itens(lista) {
      return '<ul class="lista">' + lista.map(i => `<li>${i}</li>`).join('') + '</ul>';
    }

    function setScore(id, barId, score) {
      const el = document.getElementById(id);
      el.textContent = score + '/100';
      el.className = 'score-num ' + cor(score);
      const bar = document.getElementById(barId);
      bar.style.width = score + '%';
      bar.style.background = barCor(score);
    }

    async function analisar() {
      const cv = document.getElementById('cv_file').files[0];
      const jobText = document.getElementById('job_text').value;
      const jobUrl = document.getElementById('job_url').value;

      if (!cv) { alert('Selecione o PDF do currículo.'); return; }
      if (!jobText && !jobUrl) { alert('Preencha o texto da vaga ou a URL.'); return; }

      document.getElementById('btn').disabled = true;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('erro').style.display = 'none';
      document.getElementById('abas-container').style.display = 'none';
      document.getElementById('plano-container').style.display = 'none';

      const form = new FormData();
      form.append('cv_file', cv);
      form.append('job_text', jobText);
      form.append('job_url', jobUrl);

      try {
        const res = await fetch('http://localhost:8000/analisar', { method: 'POST', body: form });
        const data = await res.json();

        if (data.erro) {
          document.getElementById('erro').textContent = data.erro;
          document.getElementById('erro').style.display = 'block';
          return;
        }

        const { tecnico, rh, juiz } = data;

        setScore('score-tecnico', 'bar-tecnico', tecnico.score_tecnico);
        document.getElementById('conteudo-tecnico').innerHTML = `
          <div class="card">
            <div class="section-label">Tecnologias que batem</div>
            ${tags(tecnico.tecnologias_match, 'tag-verde')}
          </div>
          <div class="card">
            <div class="section-label">O que está faltando</div>
            ${tags(tecnico.tecnologias_faltando, 'tag-vermelho')}
          </div>
          <div class="card">
            <div class="section-label">Projetos relevantes</div>
            ${itens(tecnico.projetos_relevantes)}
          </div>
          <div class="card">
            <div class="section-label">Parecer</div>
            <div class="veredicto">${tecnico.parecer}</div>
          </div>
        `;

        setScore('score-rh', 'bar-rh', rh.score_rh);
        document.getElementById('conteudo-rh').innerHTML = `
          <div class="card">
            <div class="section-label">Pontos fortes comportamentais</div>
            ${itens(rh.pontos_fortes_comportamentais)}
          </div>
          <div class="card">
            <div class="section-label">Red flags</div>
            ${tags(rh.red_flags, 'tag-vermelho')}
          </div>
          <div class="card">
            <div class="section-label">Apresentação do CV</div>
            <div class="tag-list">
              <span class="tag tag-azul">Clareza: ${rh.apresentacao_cv.clareza}/100</span>
              <span class="tag tag-azul">Objetividade: ${rh.apresentacao_cv.objetividade}/100</span>
              <span class="tag tag-azul">Consistência: ${rh.apresentacao_cv.consistencia}/100</span>
            </div>
          </div>
          <div class="card">
            <div class="section-label">Parecer</div>
            <div class="veredicto">${rh.parecer}</div>
          </div>
        `;

        setScore('score-juiz', 'bar-juiz', juiz.score_final);
        const decisaoClasse = juiz.decisao.includes('NÃO') ? 'decisao-nao' : juiz.decisao.includes('RESSALVA') ? 'decisao-ressalva' : 'decisao-sim';
        document.getElementById('conteudo-juiz').innerHTML = `
          <div class="card">
            <div class="chance-container">
              <div class="chance-num ${cor(juiz.chance_contratacao)}">${juiz.chance_contratacao}%</div>
              <div class="chance-desc">chance de contratação</div>
            </div>
            <div class="decisao ${decisaoClasse}">${juiz.decisao}</div>
            <div class="section-label">Simulação do processo</div>
            <div class="sim-item">
              <div class="sim-icon">${juiz.simulacao.triagem_cv.passou ? '✅' : '❌'}</div>
              <div>
                <div class="sim-titulo">Triagem do CV</div>
                <div class="sim-motivo">${juiz.simulacao.triagem_cv.motivo}</div>
              </div>
            </div>
            <div class="sim-item">
              <div class="sim-icon">${juiz.simulacao.entrevista_tecnica.passou ? '✅' : '❌'}</div>
              <div>
                <div class="sim-titulo">Entrevista Técnica</div>
                <div class="sim-motivo">${juiz.simulacao.entrevista_tecnica.motivo}</div>
              </div>
            </div>
            <div class="sim-item">
              <div class="sim-icon">${juiz.simulacao.entrevista_rh.passou ? '✅' : '❌'}</div>
              <div>
                <div class="sim-titulo">Entrevista RH</div>
                <div class="sim-motivo">${juiz.simulacao.entrevista_rh.motivo}</div>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="section-label">Veredicto final</div>
            <div class="veredicto">${juiz.veredicto_final}</div>
          </div>
        `;

        const plano = juiz.o_que_mudar_agora;
        document.getElementById('plano-itens').innerHTML = plano.map((item, i) => `
          <div class="plano-item">
            <div class="plano-num">${i + 1}</div>
            <div class="plano-texto">${item}</div>
          </div>
        `).join('');

        document.getElementById('abas-container').style.display = 'block';
        document.getElementById('plano-container').style.display = 'block';
        trocarAba('tecnico');

      } catch (e) {
        document.getElementById('erro').textContent = 'Erro ao conectar com a API. Verifique se o servidor está rodando.';
        document.getElementById('erro').style.display = 'block';
      } finally {
        document.getElementById('btn').disabled = false;
        document.getElementById('loading').style.display = 'none';
      }
    }
  </script>

</body>
</html>
